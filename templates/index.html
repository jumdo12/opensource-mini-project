<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방명록</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            color: #333;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        header h1 {
            font-size: 2rem;
            color: #2d6a4f;
        }

        header p {
            margin-top: 6px;
            color: #666;
            font-size: 0.95rem;
        }

        .btn-write {
            display: inline-block;
            margin-top: 16px;
            padding: 10px 24px;
            background: #2d6a4f;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        .btn-write:hover { background: #1b4332; }

        .entries { margin-top: 24px; }

        .entry {
            background: #fff;
            border-radius: 10px;
            padding: 18px 20px;
            margin-bottom: 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .entry-name {
            font-weight: 700;
            color: #2d6a4f;
            font-size: 1rem;
        }

        .entry-date {
            font-size: 0.8rem;
            color: #999;
        }

        .entry-message {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #444;
            white-space: pre-wrap;
        }

        .empty {
            text-align: center;
            color: #aaa;
            padding: 40px 0;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📖 방명록</h1>
            <p>방문해 주셔서 감사합니다. 한 마디 남겨주세요!</p>
            <a href="/write" class="btn-write">✏️ 글 남기기</a>
        </header>

        <div class="entries">
            {% if entries %}
                {% for e in entries %}
                <div class="entry">
                    <div class="entry-header">
                        <span class="entry-name">{{ e.name }}</span>
                        <span class="entry-date">{{ e.date }}</span>
                    </div>
                    <p class="entry-message">{{ e.message }}</p>
                </div>
                {% endfor %}
            {% else %}
                <p class="empty">아직 방명록이 없습니다. 첫 번째로 남겨보세요!</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
