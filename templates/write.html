<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방명록 쓰기</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 36px 32px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 1.5rem;
            color: #2d6a4f;
            margin-bottom: 24px;
            text-align: center;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #cdd9e5;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 18px;
        }

        input[type="text"]:focus,
        textarea:focus {
            border-color: #2d6a4f;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 4px;
        }

        .btn {
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            text-decoration: none;
            display: inline-block;
        }

        .btn-submit {
            background: #2d6a4f;
            color: #fff;
            transition: background 0.2s;
        }

        .btn-submit:hover { background: #1b4332; }

        .btn-cancel {
            background: #eee;
            color: #555;
            transition: background 0.2s;
        }

        .btn-cancel:hover { background: #ddd; }
    </style>
</head>
<body>
    <div class="card">
        <h1>✏️ 방명록 쓰기</h1>
        <form action="/submit" method="post">
            <label for="name">이름</label>
            <input type="text" id="name" name="name" placeholder="이름을 입력하세요" required maxlength="50">

            <label for="message">내용</label>
            <textarea id="message" name="message" placeholder="하고 싶은 말을 남겨주세요" required maxlength="500"></textarea>

            <div class="btn-row">
                <a href="/" class="btn btn-cancel">취소</a>
                <button type="submit" class="btn btn-submit">등록</button>
            </div>
        </form>
    </div>
</body>
</html>
